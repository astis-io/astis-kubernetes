{{- if .Values.serviceAccount.create }}
# The ServiceAccount whose projected token proves the pod's identity to ASTIS.
# Its name is part of the API-key workload binding and is cross-checked against
# the SA JWT server-side.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "astis-workload-secrets.serviceAccountName" . }}
  namespace: {{ include "astis-workload-secrets.namespace" . }}
  labels:
    {{- include "astis-workload-secrets.labels" . | nindent 4 }}
{{- end }}
