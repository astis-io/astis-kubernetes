# ---------------------------------------------------------------------------
# TWO secrets the pod consumes. NEITHER contains plaintext.
#
#  1. astis-api-key          — the bound API key (entry credential, Layer 1).
#  2. astis-sealed-db-password — the sealed envelope (ASTIS:v2:...). This is
#       ciphertext: even with both secrets and cluster root, you cannot recover
#       the plaintext without being the bound pod running an approved image.
#
# Do NOT commit real values. Create them out-of-band, e.g.:
#
#   kubectl -n hr-portal-demo create secret generic astis-api-key \
#     --from-literal=api-key="astis_live_sk_xxx_yyy"
#
#   kubectl -n hr-portal-demo create secret generic astis-sealed-db-password \
#     --from-file=envelope=./db-password.sealed
#
# The sealed envelope is produced at encrypt time by SecOps using the org public
# key (astis-cli, or any SDK's seal helper), binding it to cluster_id + namespace
# + serviceaccount.
# This repo's example covers the DECRYPT (pod) side; see the README for the encrypt step.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: astis-api-key
  namespace: hr-portal-demo
type: Opaque
stringData:
  api-key: "astis_live_sk_REPLACE_PREFIX_REPLACE_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: astis-sealed-db-password
  namespace: hr-portal-demo
type: Opaque
stringData:
  # The ASTIS:v2:<base64url-json> wire string emitted by the encrypt tool.
  envelope: "ASTIS:v2:REPLACE_WITH_SEALED_ENVELOPE"
